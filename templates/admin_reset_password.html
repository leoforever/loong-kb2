{% extends "base.html" %}
{% block title %}重置密码 - 龙芯知识库{% endblock %}
{% block content %}
<div class="page-main" style="max-width:480px;">
    <div style="margin-bottom:16px;">
        <a href="/admin/users" style="color:#CC0000; text-decoration:none; font-size:14px;">&larr; 返回用户管理</a>
    </div>
    <div class="card">
        <h2 style="font-size:20px; font-weight:600; margin-bottom:8px;">重置用户密码</h2>
        <p style="color:#888; font-size:14px; margin-bottom:24px;">
            为用户 <strong>{{ user.username }}</strong> 重置密码
        </p>
        <form method="post">
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" required minlength="6" placeholder="至少6位">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="confirm_password" required minlength="6" placeholder="再次输入新密码">
            </div>
            <div style="display:flex; gap:12px; margin-top:24px;">
                <button type="submit" class="btn btn-danger">确认重置</button>
                <a href="/admin/users" class="btn btn-secondary" style="text-align:center;">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
