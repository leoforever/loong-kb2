{% extends "base.html" %}
{% block title %}修改密码 - 龙芯知识库{% endblock %}
{% block content %}
<div class="page-main" style="max-width:480px;">
    <div class="card">
        <h2 style="font-size:20px; font-weight:600; margin-bottom:24px;">修改密码</h2>
        <form method="post">
            <div class="form-group">
                <label>当前密码</label>
                <input type="password" name="old_password" required placeholder="请输入当前密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" required minlength="6" placeholder="至少6位">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" name="confirm_password" required minlength="6" placeholder="再次输入新密码">
            </div>
            <div style="display:flex; gap:12px; margin-top:24px;">
                <button type="submit" class="btn btn-primary">确认修改</button>
                <a href="/qa" class="btn btn-secondary" style="text-align:center;">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
